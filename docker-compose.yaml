services:
  django:
    build: .
    container_name: django_app
    restart: always
    command: >
      sh -c "uv run python manage.py migrate &&
            uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    expose:
      - "8000"


  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django